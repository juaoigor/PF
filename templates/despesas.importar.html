{% extends 'index.html' %}

{% block content %}

<div class="row">
  <div class="col-8">
    <div class="card">
      <div class="card-header">Despesas</div>
      <div class="card-body">
        <form  action="/despesas/importar" method="post">
          <div class="form-group row">
            <label for="idTexto" class="col-2 col-form-label">Texto</label>
            <div class="col-10"><textarea id="idTexto" name="texto" rows="20" cols="80"></textarea></div>
          </div>
          <div class="form-group row">
            <div class="col-6">
              <button type="submit" class="btn btn-primary" name="Processar" value="Processar">Processar</button>
            </div>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>


<div class="row">
  <div class="col-8">
    <div class="card">
      <div class="card-header">Processado</div>
      <div class="card-body">
        <form  action="/despesas/importar" method="post">
          <table>
            <tr>
              <th>Data</th>
              <th>Texto</th>
              <th>Valor</th>
            </tr>
            {% for r in tb %}
            <tr>
              <td><input type="text" class="form-control form-control-sm" name="{{ r['ID']}}_Data" value="{{ r['Data']}}"></td>
              <td><input type="text" class="form-control form-control-sm" name="{{ r['ID']}}_Texto" value="{{ r['Texto']}}"></td>
              <td><input type="text" class="form-control form-control-sm" name="{{ r['ID']}}_Valor" value="{{ r['Valor']}}"></td>
            </tr>
            {% endfor %}
          </table>
          <div class="form-group row">
            <div class="col-6">
              <button type="submit" class="btn btn-primary" name="Inserir" value="Inserir">Inserir</button>
            </div>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>

{% endblock %}
