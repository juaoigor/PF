{% extends 'index.html' %}

{% block content %}

<div class="row">
  <div class="col-9">

  </div>
  <div class="col-3">
    <div class="card">
      <div class="card-header">Setup</div>
      <div class="card-body">
        <form  action="/despesas/resumo" method="post">

          <div class="form-group row">
            <label for="idConta" class="col-2 col-form-label">Conta</label>
            <div class="col-10">
              <select class="form-control" id="idConta">
                {% for d in labels %}
                  <option value="{{ d['id'] }}">{{ d['Conta'] }}</option>
                {% endfor %}                
              </select>
            </div>
          </div>

          <div class="form-group row">
            <label for="idDatePicker" class="col-2 col-form-label">Conta</label>
            <div class="col-10">
              <input class="form-control" type="text" id="idDatePicker"/>
            </div>
          </div>

          
          <div class="form-group row">
            <div class="col-10">
              <button type="submit" class="btn btn-primary" name="Criar" value="Criar">Criar</button>
            </div>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>

<script type="text/javascript">
  $("#idDatePicker").datetimepicker();
</script>

{% endblock %}
