{% extends 'index.html' %}

{% block content %}

<div class="row">
  <div class="col-9">
    <table>
      <tr>
        <th>ID</th>
        <th>Conta</th>
        <th>RecDes</th>
        <th>FixVar</th>
      </tr>
      {% for d in tb %}
      <tr>
        <td>{{ d['id'] }}</td>
        <td>{{ d['Conta'] }}</td>
        <td>{{ d['RecDes'] }}</td>
        <td>{{ d['FixVar'] }}</td>
      </tr>
      {% endfor %}
    </table>
  </div>
  <div class="col-3">
    <div class="card">
      <div class="card-header">Setup</div>
      <div class="card-body">
        <form  action="/config/contas" method="post">
          <div class="form-group row">
            <label for="idContas" class="col-2 col-form-label">Conta</label>
            <div class="col-10"><input type="text" class="form-control" id="idContas" placeholder="Conta"></div>
          </div>
          <fieldset class="form-group">
            <div class="row">
              <legend class="col-form-label col-2 pt-0">Tipo</legend>
              <div class="col-10">
                <div class="form-check">
                  <input class="form-check-input" type="radio" name="RecDes" id="gridRadios1" value="0" checked>
                  <label class="form-check-label" for="gridRadios1">Receita</label>
                </div>
                <div class="form-check">
                  <input class="form-check-input" type="radio" name="RecDes" id="gridRadios2" value="1">
                  <label class="form-check-label" for="gridRadios2">Despesa</label>
                </div>
              </div>
            </div>
          </fieldset>
          <div class="form-group row">
            <div class="col-10">
              <button type="submit" class="btn btn-primary" name="Criar" value="Criar">Criar</button>
            </div>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>


{% endblock %}
